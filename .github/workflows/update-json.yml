name: Update JSON from Manual Trigger

on:
  workflow_dispatch:
    inputs:
      json_data:
        description: "JSON Data"
        required: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Write JSON
        run: |
          echo '${{ github.event.inputs.json_data }}' > dinghy_service_status.json

      - name: Commit changes
        run: |
          git config user.name "auto-update"
          git config user.email "auto@github.com"
          git add dinghy_service_status.json

          # ✅ FIX: Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update via workflow"
            git push
          fi
