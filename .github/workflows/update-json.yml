name: Update JSON from Manual Trigger

on:
  workflow_dispatch:
    inputs:
      json_data:
        description: "JSON Data"
        required: true


repository_dispatch:
   types: [update-json]


permissions:
  contents: write  

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Write JSON
        run: |
          echo '${{ github.event.client_payload.json_data || github.event.inputs.json_data }}' > dinghy_service_status.json

      - name: Commit changes
        run: |
          git config user.name "auto-update"
          git config user.email "auto@github.com"
          git add dinghy_service_status.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update via workflow"
            git push
          fi
